<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jamie Rose - Hardcore Cosmic Game</title>

<style>
  body {
    margin: 0;
    padding: 30px 20px;
    padding-top: 50px;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: #e6f0ff;
    text-align: center;
    min-height: 100vh;
    background: 
      linear-gradient(to bottom, rgba(30, 40, 80, 0.8), rgba(20, 25, 50, 0.9)),
      url("images/galaxy3.jpg");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
  }

  /* SHARED GLASSMORPHISM BOX STYLE */
  .box {
    max-width: 450px;
    margin: 20px auto;
    padding: 30px;
    border-radius: 20px;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
  }

  /* TOP BOX: PROFILE STYLING */
  .profile-box img {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #8fc5ff;
    box-shadow: 0 0 20px rgba(143, 197, 255, 0.8);
    display: block;
    margin: 0 auto;
  }

  .username {
    display: inline-block;
    margin-top: 20px;
    padding: 5px 20px;
    border-radius: 25px;
    border: 1px solid #66b2ff;
    color: #b3d4ff;
    font-size: 0.9rem;
    letter-spacing: 1px;
    box-shadow: 0 0 10px rgba(102, 178, 255, 0.3);
  }

  .profile-box h1 {
    color: #ac7bac;
    text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
    letter-spacing: 2px;
    margin-top: 15px;
    margin-bottom: 0;
    font-size: 1.8rem;
  }

  /* BOTTOM BOX: GAME STYLING */
  .game-box h2 {
    color: #66b2ff;
    margin-top: 0;
    text-shadow: 0 0 10px rgba(102, 178, 255, 0.4);
  }

  .status-text {
    font-size: 1.2rem;
    font-weight: bold;
    margin-bottom: 20px;
    color: #2ed573;
    height: 30px;
  }

  /* 2x2 GRID FOR 4 COLORS */
  .game-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    max-width: 280px;
    margin: 20px auto;
  }

  .color-pad {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 15px;
    cursor: pointer;
    opacity: 0.5;
    transition: all 0.1s;
    border: 2px solid rgba(255, 255, 255, 0.1);
  }

  /* Game Colors */
  #pad-red { background-color: #d51c47; }
  #pad-blue { background-color: #1761d1; }
  #pad-green { background-color: #19a06c; }
  #pad-yellow { background-color: #bd5520; }

  /* Active/Flashing state */
  .color-pad.active {
    opacity: 1;
    transform: scale(1.05);
    border-color: #fff;
  }
  
  #pad-red.active { box-shadow: 0 0 30px #c05c74; }
  #pad-blue.active { box-shadow: 0 0 30px #4a74b4; }
  #pad-green.active { box-shadow: 0 0 30px #4f8a73; }
  #pad-yellow.active { box-shadow: 0 0 30px #a48271; }

  .start-btn {
    background: transparent;
    color: #ff4757;
    border: 2px solid #ff4757;
    padding: 10px 30px;
    font-size: 1.1rem;
    font-weight: bold;
    border-radius: 30px;
    cursor: pointer;
    transition: 0.3s;
    margin-top: 10px;
  }

  .start-btn:hover {
    background: #ff4757;
    color: #fff;
    box-shadow: 0 0 20px rgba(255, 71, 87, 0.6);
  }

  /* BACK BUTTON */
  .back {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 10;
  }

  .back a {
    color: #b3d4ff;
    text-decoration: none;
    font-weight: bold;
    background: rgba(0, 0, 0, 0.3);
    padding: 10px 20px;
    border-radius: 30px;
    backdrop-filter: blur(5px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    transition: 0.3s;
  }

  .back a:hover {
    text-decoration: underline;
    background: rgba(102, 178, 255, 0.2);
    color: #fff;
  }
  .footer {
   margin-top: 20px;
   font-size: 0.8rem;
   color: #aaa;
}

</style>
</head>

<body>

<div class="back">
  <a href="index.html">← Back</a>
</div>

<div class="box profile-box">
  <img src="images/person3.jpg" alt="Profile Picture">
  <div class="username">@jeymeee</div>
  <h1>Jamie Rose Clavel</h1>
</div>

<div class="box game-box">
  <h2>Hardcore Memory Mode</h2>
  <div class="status-text" id="status">Ready?</div>
  
  <div class="game-container">
    <div class="color-pad" id="pad-red" onclick="handlePadClick('red')"></div>
    <div class="color-pad" id="pad-blue" onclick="handlePadClick('blue')"></div>
    <div class="color-pad" id="pad-green" onclick="handlePadClick('green')"></div>
    <div class="color-pad" id="pad-yellow" onclick="handlePadClick('yellow')"></div>
  </div>

  <button class="start-btn" id="start-btn" onclick="startGame()">Start Game</button>
</div>

<div class="footer">
  © 2026 Jamie Rose Clavel. All Rights Reserved.
</div>

<script>
  const colors = ['red', 'blue', 'green', 'yellow'];
  let sequence = [];
  let playerSequence = [];
  let level = 0;
  let isPlayerTurn = false;

  const statusText = document.getElementById('status');
  const startBtn = document.getElementById('start-btn');

  const delay = (ms) => new Promise(res => setTimeout(res, ms));

  async function nextRound() {
    isPlayerTurn = false;
    playerSequence = [];
    level++;
    statusText.innerText = `Level ${level}`;
    statusText.style.color = '#8fc5ff';
    
    const randomColor = colors[Math.floor(Math.random() * colors.length)];
    sequence.push(randomColor);
    
    await delay(600);
    
    // HARDCORE SPEED LOGIC:
    // Speeds up significantly with every level. Caps at extremely fast speeds.
    const flashDuration = Math.max(100, 350 - (level * 25)); // How long light stays on
    const gapDuration = Math.max(150, 500 - (level * 35));   // Wait time between flashes

    for (let i = 0; i < sequence.length; i++) {
      flashPad(sequence[i], flashDuration);
      await delay(gapDuration);
    }
    
    statusText.innerText = `Your Turn!`;
    statusText.style.color = '#2ed573'; // Green text for player's turn
    isPlayerTurn = true;
  }

  function flashPad(color, duration = 200) {
    const pad = document.getElementById(`pad-${color}`);
    pad.classList.add('active');
    
    setTimeout(() => {
      pad.classList.remove('active');
    }, duration);
  }

  function handlePadClick(color) {
    if (!isPlayerTurn) return;
    
    flashPad(color, 150); // Fast feedback on player click
    playerSequence.push(color);
    
    const currentIndex = playerSequence.length - 1;
    
    // Incorrect click
    if (playerSequence[currentIndex] !== sequence[currentIndex]) {
      statusText.innerText = `Game Over! Score: ${level - 1}`;
      statusText.style.color = '#ff4757';
      isPlayerTurn = false;
      startBtn.style.display = 'inline-block';
      startBtn.innerText = 'Try Again';
      return;
    }
    
    // Completed the sequence correctly
    if (playerSequence.length === sequence.length) {
      isPlayerTurn = false;
      statusText.innerText = `Correct!`;
      statusText.style.color = '#8fc5ff';
      setTimeout(nextRound, 600); // Shorter wait before next round starts
    }
  }

  function startGame() {
    sequence = [];
    level = 0;
    startBtn.style.display = 'none';
    nextRound();
  }
</script>

</body>
</html>
